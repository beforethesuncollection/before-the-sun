<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Before The Sun</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Montserrat', sans-serif;
        background: #efe7dd;
        margin: 0;
        padding: 0;
        text-align: center;
        color: #9b4922;
    }

    .container {
        max-width: 480px;
        margin: 60px auto;
        padding: 0 20px;
    }

    img.logo {
        width: 180px;
        margin-bottom: 25px;
    }

    h1 {
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    p.tagline {
        font-size: 16px;
        font-weight: 300;
        margin-bottom: 40px;
        color: #7a3a1b;
    }

    a.button {
        display: block;
        background: #9b4922;
        color: #efe7dd;
        padding: 16px;
        margin: 14px 0;
        border-radius: 10px;
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
        transition: transform 0.15s ease, opacity 0.2s ease;
    }

    a.button:hover {
        opacity: 0.9;
        transform: translateY(-2px);
    }
</style>
</head>

<body>
<div class="container">

    <img src="Before the Sun.jpg" alt="Before The Sun Logo" class="logo">

    <h1>Before The Sun</h1>
    <p class="tagline">A Motivational Collection For a Better You.</p>

    <a class="button" href="mailto:beforethesuncollection@gmail.com">Email Us</a>
</div>
</body>
</html>
